<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sitara Cinema</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-50">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden"></div>

    <div class="relative z-10">
        <nav
            class="flex items-center justify-between px-8 py-5 bg-slate-800/40 backdrop-blur-xl border-b border-slate-700/30">
            <div>
                <h1
                    class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                    Sitara Cinema
                </h1>
            </div>
            <a href="../authPage/auth.html">
                <button
                    class="bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold px-5 py-2.5 rounded-xl shadow-[0_4px_20px_rgba(16,185,129,0.3)] hover:opacity-90 transition">
                    Sign In
                </button>
            </a>
        </nav>

        <main class="px-8 py-12">
            <h2 class="text-3xl font-bold mb-10 text-center">
                Discover Your Next Movie
            </h2>

            <div
                class="w-full max-w-sm rounded-3xl bg-slate-800/80 backdrop-blur-xl border border-slate-700/30 shadow-[0_25px_60px_rgba(0,0,0,0.5)] overflow-hidden transition hover:-translate-y-1 hover:shadow-[0_35px_80px_rgba(0,0,0,0.65)] cursor-pointer">

                <div class="relative bg-[#080d12] h-[210px] flex items-center justify-center overflow-hidden">
                    <img src="../utils/Posters/dhurandhar_poster.avif" alt=""
                        class="w-full h-full object-cover absolute inset-0" />
                    <div
                        class="relative z-10 text-[52px] font-bold tracking-[0.14em] text-slate-100 text-center leading-none">
                    </div>
                </div>

                <div class="p-8">

                    <div class="flex items-start justify-between gap-4 mb-2">
                        <div>
                            <h3 class="text-xl font-bold">Dhurandhar</h3>
                            <p class="text-slate-400 text-sm mt-1">Jassi ko ghar ki yaad kyu nhi aai?</p>
                        </div>

                        <a rel="stylesheet" href="../../../seat.html">
                            <button
                                class="bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold text-sm px-5 py-2.5 rounded-xl shadow-[0_4px_20px_rgba(16,185,129,0.3)] hover:opacity-90 hover:-translate-y-[1px] transition whitespace-nowrap">
                                Book Ticket
                            </button>
                        </a>
                    </div>

                    <div class="flex items-center gap-3 my-5">
                        <div class="flex-1 h-px bg-slate-700/50"></div>
                    </div>

                    <p class="text-center text-slate-600 mb-4 italic">
                        Now Playing:
                        <span class="text-rose-400 font-semibold">
                            Dhurandhar: The Revenge
                        </span>
                    </p>

                    <div class="flex flex-wrap gap-2 mb-4 ml-6">
                        <span
                            class="bg-white/10 border border-slate-400/20 text-slate-400 text-xs font-semibold tracking-wide px-3 py-1 rounded-md uppercase">
                            UA 16+
                        </span>
                        <span
                            class="bg-white/10 border border-slate-400/20 text-slate-400 text-xs font-semibold tracking-wide px-3 py-1 rounded-md uppercase">
                            Thriller
                        </span>
                        <span
                            class="bg-white/10 border border-slate-400/20 text-slate-400 text-xs font-semibold tracking-wide px-3 py-1 rounded-md uppercase">
                            IMAX 2D
                        </span>
                    </div>

                    <p class="text-slate-500 text-xs">
                        Cast:
                        <span class="text-slate-400 font-semibold">
                            Ranveer Singh, Akshay Khanna, Arjun Rampal, Sanjay Dutt
                        </span>
                    </p>

                </div>
            </div>


        </main>
    </div>

</body>

</html>
